<!DOCTYPE html>

<title>Tarea - CODECOMBAT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
color:white;
background:radial-gradient(circle at top,#1a0033 0%,#050505 45%,#000000 100%);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* BOTON VOLVER */

.back-btn{
position:fixed;
top:20px;
right:20px;
background:rgba(199,125,255,0.15);
border:1px solid rgba(199,125,255,0.4);
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
transition:.3s;
z-index:1000;
}

.back-btn:hover{
background:rgba(199,125,255,0.35);
box-shadow:0 0 15px rgba(124,44,255,0.6);
}

/* HERO */

.hero{
text-align:center;
padding-top:80px;
padding-bottom:30px;
}

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:3.5rem;
background:linear-gradient(90deg,#ffffff,#c77dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* CONTENEDOR IMAGEN */

.image-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.image-box{
width:85%;
max-width:1100px;
height:60vh;
border-radius:16px;
overflow:hidden;
background:linear-gradient(145deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));
box-shadow:0 10px 40px rgba(124,44,255,0.2);
display:flex;
align-items:center;
justify-content:center;
}

.image-box img{
width:100%;
height:100%;
object-fit:contain;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
color:#888;
}

</style>

</head>

<body>

<a class="back-btn" href="index.html">← Volver</a>

<section class="hero">

<h1>Tarea - CODECOMBAT</h1>

<p class="text-secondary mt-3">
Ejercicio realizado en la plataforma CodeCombat aplicando lógica de programación.
</p>

</section>

<section class="image-container">

<div class="image-box">

<img src="images/imc1.jpeg">

</div>

</section>

<footer>

</footer>
